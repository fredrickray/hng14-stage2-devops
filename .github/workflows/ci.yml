name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python linters
        run: pip install flake8==7.1.1

      - name: Install Hadolint
        run: |
          curl -sSL -o /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: flake8 (API + worker)
        run: flake8 api worker

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: eslint (frontend)
        working-directory: frontend
        run: npm run lint

      - name: hadolint (Dockerfiles)
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: pytest with coverage
        run: |
          pytest --cov=main --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  # Build, registry push, Trivy, and integration share one job so the ephemeral
  # registry service remains reachable for pull-based compose tests.
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for compose / integration
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cp .env.example .env
          PW="$(openssl rand -hex 24)"
          sed -i "s/__SET_A_STRONG_REDIS_PASSWORD__/${PW}/g" .env
          sed -i "s/^DOCKER_IMAGE_TAG=.*/DOCKER_IMAGE_TAG=${GITHUB_SHA}/" .env
          sed -i "s|^DOCKER_IMAGE_PREFIX=.*|DOCKER_IMAGE_PREFIX=localhost:5000/|" .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Stage: build — push images to local registry"
        env:
          REGISTRY: localhost:5000
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          for name in api worker frontend; do
            docker build -t "${REGISTRY}/${name}:${TAG}" -t "${REGISTRY}/${name}:latest" "./${name}"
            docker push "${REGISTRY}/${name}:${TAG}"
            docker push "${REGISTRY}/${name}:latest"
          done

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          set -euo pipefail
          wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          sudo tar xf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -C /usr/local/bin trivy
          rm -f "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          trivy --version

      - name: "Stage: security scan — Trivy (SARIF artifacts + fail on CRITICAL)"
        env:
          REGISTRY: localhost:5000
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p trivy-out
          for name in api worker frontend; do
            trivy image --severity CRITICAL --format sarif \
              -o "trivy-out/${name}.sarif" --exit-code 0 \
              "${REGISTRY}/${name}:${TAG}"
          done
          for name in api worker frontend; do
            trivy image --severity CRITICAL --exit-code 1 --format table \
              "${REGISTRY}/${name}:${TAG}"
          done

      - name: Upload Trivy SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-out/*.sarif

      - name: "Stage: integration test — full stack via frontend"
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/integration-test.sh

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for rolling deploy demo
        run: |
          set -euo pipefail
          cp .env.example .env
          PW="$(openssl rand -hex 24)"
          sed -i "s/__SET_A_STRONG_REDIS_PASSWORD__/${PW}/g" .env

      - name: Rolling API update (health-gated)
        run: bash scripts/rolling-deploy.sh .env
